<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - AgriConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css">
</head>

<body>
    <div class="sidebar">
        <div class="logo"><i class="fas fa-seedling"></i> AgriConnect</div>
        <a href="dashboard.html" class="menu-item"><i class="fas fa-home"></i> Dashboard</a>
        <a href="dashboard.html" class="menu-item"><i class="fas fa-carrot"></i> Products</a>
        <a href="dashboard.html" class="menu-item"><i class="fas fa-shopping-cart"></i> View All Orders</a>
        <div class="menu-item active"><i class="fas fa-users-gear"></i> Staff & Deliverers</div>
        <div class="menu-item"><i class="fas fa-chart-line"></i> Analytics</div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>User Management</h1>
            <button class="btn-logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>

        <div class="card">
            <h3>Add New User</h3>
            <form id="addUserForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" id="username" placeholder="Username" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" placeholder="Email" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" placeholder="Password" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Role</label>
                        <select id="role">
                            <option value="user">User</option>
                            <option value="staff">Staff</option>
                            <option value="accountant">Accountant</option>
                            <option value="deliverer">Deliverer</option>
                            <option value="owner">Owner</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Add User</button>
            </form>
            <p id="message" style="margin-top: 10px;"></p>
        </div>

        <div class="card">
            <h3>Current Users</h3>
            <table id="usersTable">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Registered</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Users will be populated here -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/users.js"></script>
</body>

</html>
