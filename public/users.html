<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - AgriConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/64d58efce2.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles.css">
    <!-- Reusing dashboard styles if possible, but might need inline tweaks -->
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background-color: #f0f2f5;
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 250px;
            background-color: #27ae60;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 40px;
            align-self: center;
        }

        .menu-item {
            padding: 15px;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 10px;
            margin-bottom: 5px;
            text-decoration: none;
            color: white;
            display: block;
        }

        .menu-item:hover,
        .menu-item.active {
            background-color: #2ecc71;
        }

        .menu-item i {
            margin-right: 10px;
            width: 20px;
        }

        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        h2 {
            color: #333;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        form input,
        form select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            width: 100%;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        button.btn-primary {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        button.btn-danger {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #f0f2f5;
        }

        th {
            background-color: #f9f9f9;
        }

        .btn-logout {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="logo">AgriConnect</div>
        <a href="dashboard.html" class="menu-item"><i class="fas fa-home"></i> Dashboard</a>
        <a href="dashboard.html" class="menu-item"><i class="fas fa-carrot"></i> Products</a>
        <a href="dashboard.html" class="menu-item"><i class="fas fa-shopping-cart"></i> View All Orders</a>
        <div class="menu-item active"><i class="fas fa-users"></i> Staff & Deliverers</div>
        <div class="menu-item"><i class="fas fa-chart-line"></i> Analytics</div>
        <div class="menu-item"><i class="fas fa-cog"></i> Settings</div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>User Management</h1>
            <button class="btn-logout" id="logoutBtn">Logout</button>
        </div>

        <div class="card">
            <h3>Add New User</h3>
            <form id="addUserForm">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="text" id="username" placeholder="Username" required>
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="password" id="password" placeholder="Password" required>
                    <select id="role">
                        <option value="staff">Staff</option>
                        <option value="deliverer">Deliverer</option>
                        <option value="owner">Owner</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">Add User</button>
            </form>
            <p id="message" style="margin-top: 10px;"></p>
        </div>

        <div class="card">
            <h3>Current Users</h3>
            <table id="usersTable">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Registered</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Users will be populated here -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/users.js"></script>
</body>

</html>
